name: Build Android APK & Create Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create .env.local from Secrets
      run: |
        echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env.local
        echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env.local
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.local
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x android-app/gradlew
      
    - name: Build Debug & Release APKs
      run: |
        cd android-app
        ./gradlew assembleDebug
        ./gradlew assembleRelease
      
    - name: Check for Signing Key
      id: check_key
      run: |
        if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
          echo "has_key=true" >> $GITHUB_OUTPUT
        else
          echo "has_key=false" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Sign Release APK
      if: steps.check_key.outputs.has_key == 'true'
      id: sign_app
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: android-app/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Rename Signed APK
      if: steps.check_key.outputs.has_key == 'true'
      run: |
        mv ${{ steps.sign_app.outputs.signedReleaseFile }} android-app/app/build/outputs/apk/release/bindal-punching-release-signed.apk
      shell: bash

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          android-app/app/build/outputs/apk/debug/app-debug.apk
          android-app/app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
